# ─────────────────────────────────────────────────────────────────────────────
# demo-app.yaml
# Deploys the OTel demo application into the "demo" namespace.
# Sends OTLP traffic to the collector in the "observability" namespace.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Namespace
metadata:
  name: demo

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: demo
  labels:
    app: demo-app
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
        version: "1.0.0"
      annotations:
        # Tells Prometheus to scrape the app if you have a scrape job for it
        prometheus.io/scrape: "false"
    spec:
      containers:
        - name: demo-app
          image: suregistry.azurecr.io/exemplar-demo-app:v9   # ← update this
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            # ── OTel SDK configuration ───────────────────────────────────────
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              # Cross-namespace DNS: <service>.<namespace>.svc.cluster.local
              value: "http://otel-collector.observability.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAME
              value: "demo-service"
            - name: OTEL_SERVICE_VERSION
              value: "1.0.0"
            - name: DEPLOYMENT_ENVIRONMENT
              value: "production"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            # Enable exemplars (requires OTel SDK >= 1.24)
            - name: OTEL_METRICS_EXEMPLAR_FILTER
              value: "trace_based"             # attach exemplars when a trace is active
            # ── Kubernetes downward API — used for resource attributes ────────
            - name: K8S_CLUSTER_NAME
              value: "suexemplaraks"               # ← change to your cluster name
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu:    50m
              memory: 128Mi
            limits:
              cpu:    200m
              memory: 256Mi

---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: demo
  labels:
    app: demo-app
spec:
  selector:
    app: demo-app
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP

